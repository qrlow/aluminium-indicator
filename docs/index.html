<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aluminium Demand/Supply Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --ink: #1c2421;
        --muted: #667069;
        --line: #d9ded6;
        --accent: #0f766e;
        --accent-ink: #ffffff;
        --demand: #2563eb;
        --supply: #b45309;
        --long: #6d28d9;
        --short: #047857;
        --risk: #b91c1c;
        --ease: #047857;
        --watch: #475569;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        width: min(1480px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 22px 0 38px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) auto;
        gap: 20px;
        align-items: end;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.65rem, 2.8vw, 2.55rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      h2,
      h3 {
        letter-spacing: 0;
      }

      .timestamp {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
        align-items: center;
      }

      .search {
        min-width: min(360px, 100%);
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
      }

      .select {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 34px 0 10px;
        background: #fff;
        color: var(--ink);
      }

      .segmented {
        display: inline-grid;
        grid-auto-flow: column;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
        height: 38px;
      }

      .segmented button {
        border: 0;
        border-right: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        padding: 0 12px;
        min-width: 56px;
        cursor: pointer;
      }

      .segmented button:last-child {
        border-right: 0;
      }

      .segmented button.active {
        background: var(--accent);
        color: var(--accent-ink);
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin: 20px 0 10px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 1.08rem;
        line-height: 1.2;
      }

      .count {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .factor-list {
        display: grid;
        gap: 24px;
      }

      .factor-section {
        border-top: 1px solid var(--line);
        padding-top: 16px;
      }

      .factor-header {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) auto;
        gap: 16px;
        align-items: start;
        margin-bottom: 10px;
      }

      .factor-title {
        margin: 0;
        font-size: 1.04rem;
        line-height: 1.25;
      }

      .factor-metrics {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
        margin-top: 7px;
      }

      .factor-count {
        color: var(--muted);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .signal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(460px, 100%), 1fr));
        gap: 10px;
      }

      .signal {
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 5px solid var(--watch);
        border-radius: 8px;
        padding: 14px;
        min-width: 0;
      }

      .signal[data-side="demand"] {
        border-left-color: var(--demand);
      }

      .signal[data-side="supply"] {
        border-left-color: var(--supply);
      }

      .signal-title {
        margin: 0;
        font-size: 1rem;
        line-height: 1.32;
      }

      .summary {
        margin: 8px 0 0;
        color: #374151;
        font-size: 0.93rem;
        line-height: 1.45;
      }

      .details {
        margin: 10px 0 0;
        padding-left: 18px;
        color: #2f3a35;
        font-size: 0.91rem;
        line-height: 1.43;
      }

      .details li + li {
        margin-top: 4px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 0.84rem;
        margin-top: 9px;
      }

      .sources {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .source-link {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        color: var(--ink);
        background: #fafbf9;
        font-size: 0.8rem;
        line-height: 1;
        text-decoration: none;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .source-link:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 9px;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--muted);
        background: #fafbf9;
        font-size: 0.78rem;
        line-height: 1;
        white-space: nowrap;
      }

      .tag.demand {
        color: var(--demand);
        border-color: #bfdbfe;
      }

      .tag.supply {
        color: var(--supply);
        border-color: #fed7aa;
      }

      .tag.short {
        color: var(--short);
        border-color: #bbf7d0;
      }

      .tag.long {
        color: var(--long);
        border-color: #ddd6fe;
      }

      .tag.tight {
        color: var(--risk);
        border-color: #fecaca;
      }

      .tag.ease {
        color: var(--ease);
        border-color: #bbf7d0;
      }

      .empty,
      .error {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        color: var(--muted);
      }

      .error {
        color: var(--risk);
      }

      @media (max-width: 1050px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: start;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100vw - 20px, 1480px);
          padding-top: 14px;
        }

        .factor-header {
          grid-template-columns: 1fr;
        }

        .factor-count {
          white-space: normal;
        }

        .segmented {
          width: 100%;
          grid-auto-columns: 1fr;
        }

        .search,
        .select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Aluminium Demand/Supply Monitor</h1>
          <div class="timestamp" id="timestamp">Loading latest scan...</div>
        </div>
        <div class="toolbar" aria-label="Filters">
          <input class="search" id="search" type="search" placeholder="Search factors, summaries, sources">
          <div class="segmented" data-filter="side" aria-label="Side">
            <button class="active" data-value="all" type="button">All</button>
            <button data-value="demand" type="button">Demand</button>
            <button data-value="supply" type="button">Supply</button>
            <button data-value="mixed" type="button">Mixed</button>
          </div>
          <div class="segmented" data-filter="horizon" aria-label="Horizon">
            <button class="active" data-value="all" type="button">All</button>
            <button data-value="short" type="button">0-3m</button>
            <button data-value="long" type="button">3m+</button>
          </div>
          <select class="select" id="impact">
            <option value="all">All impacts</option>
            <option value="supply tightening">Supply tightening</option>
            <option value="supply easing">Supply easing</option>
            <option value="demand upside">Demand upside</option>
            <option value="demand downside">Demand downside</option>
            <option value="watch">Watch</option>
          </select>
        </div>
      </header>

      <section>
        <div class="section-head">
          <h2>Watched Factors</h2>
          <div class="count" id="result-count">0 signals</div>
        </div>
        <div class="factor-list" id="factors"></div>
      </section>
    </main>

    <script>
      const state = {
        data: null,
        filters: {
          side: "all",
          horizon: "all",
          impact: "all",
          search: ""
        }
      };

      const nodes = {
        timestamp: document.getElementById("timestamp"),
        factors: document.getElementById("factors"),
        resultCount: document.getElementById("result-count"),
        search: document.getElementById("search"),
        impact: document.getElementById("impact")
      };

      function formatDate(value, options = {}) {
        if (!value) return "Unknown time";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Unknown time";
        return date.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          timeZone: options.timeZone
        });
      }

      function formatUtcDate(value) {
        return `${formatDate(value, { timeZone: "UTC" })} UTC`;
      }

      function tagClass(value) {
        const text = String(value || "").toLowerCase();
        if (text === "demand") return "demand";
        if (text === "supply") return "supply";
        if (text === "short" || text === "0-3m") return "short";
        if (text === "long" || text === "3m+") return "long";
        if (text.includes("tightening") || text.includes("downside")) return "tight";
        if (text.includes("easing") || text.includes("upside")) return "ease";
        return "";
      }

      function labelHorizon(value) {
        if (value === "short") return "0-3m";
        if (value === "long") return "3m+";
        return value;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function searchable(factor, signal) {
        return [
          factor.label,
          factor.side,
          factor.horizon,
          ...(factor.metrics || []),
          signal.title,
          signal.summary,
          signal.impact,
          signal.side,
          signal.horizon,
          ...(signal.details || []),
          ...(signal.factor_labels || []),
          ...(signal.matched_terms || []),
          ...(signal.source_articles || []).map((article) => `${article.title} ${article.source}`)
        ].flat().join(" ").toLowerCase();
      }

      function signalMatches(factor, signal) {
        const search = state.filters.search.trim().toLowerCase();
        const searchTerms = search.split(/\s+/).filter(Boolean);
        const searchText = searchable(factor, signal);
        if (state.filters.side !== "all" && factor.side !== state.filters.side && signal.side !== state.filters.side) return false;
        if (state.filters.horizon !== "all" && factor.horizon !== state.filters.horizon && signal.horizon !== state.filters.horizon) return false;
        if (state.filters.impact !== "all" && signal.impact !== state.filters.impact) return false;
        if (searchTerms.length && !searchTerms.every((term) => searchText.includes(term))) return false;
        return true;
      }

      function filteredGroups() {
        return (state.data?.factor_groups || []).map((factor) => {
          const signals = (factor.signals || []).filter((signal) => signalMatches(factor, signal));
          return { ...factor, signals };
        }).filter((factor) => factor.signals.length > 0);
      }

      function renderSignal(signal) {
        const tags = [
          signal.side,
          labelHorizon(signal.horizon),
          signal.impact
        ];
        const details = (signal.details || []).length
          ? `<ul class="details">${signal.details.map((detail) => `<li>${escapeHtml(detail)}</li>`).join("")}</ul>`
          : "";
        const sourceLinks = (signal.source_articles || []).map((article) => {
          const source = article.source || "Source";
          const date = article.published_at ? ` | ${formatDate(article.published_at)}` : "";
          return `<a class="source-link" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source + date)}</a>`;
        }).join("");
        return `
          <article class="signal" data-side="${escapeHtml(signal.side)}">
            <h3 class="signal-title">${escapeHtml(signal.title)}</h3>
            <p class="summary">${escapeHtml(signal.summary || "")}</p>
            ${details}
            <div class="tags">
              ${tags.map((tag) => `<span class="tag ${tagClass(tag)}">${escapeHtml(tag)}</span>`).join("")}
            </div>
            <div class="meta">
              <span>${escapeHtml(signal.source_count || 0)} source${Number(signal.source_count || 0) === 1 ? "" : "s"}</span>
              <span>Latest: ${escapeHtml(formatDate(signal.published_at))}</span>
            </div>
            <div class="sources">${sourceLinks}</div>
          </article>
        `;
      }

      function renderFactors() {
        const groups = filteredGroups();
        const uniqueSignals = new Map();
        groups.forEach((factor) => {
          factor.signals.forEach((signal) => uniqueSignals.set(signal.id, signal));
        });
        const visibleSignals = uniqueSignals.size;
        const visibleArticles = [...uniqueSignals.values()].reduce((sum, signal) => sum + Number(signal.source_count || 0), 0);
        nodes.resultCount.textContent = `${visibleSignals} signals | ${visibleArticles} source articles`;

        if (!groups.length) {
          nodes.factors.innerHTML = '<div class="empty">No matching factor signals in the current scan.</div>';
          return;
        }

        nodes.factors.innerHTML = groups.map((factor) => {
          const articleCount = factor.signals.reduce((sum, signal) => sum + Number(signal.source_count || 0), 0);
          return `
            <section class="factor-section">
              <div class="factor-header">
                <div>
                  <h3 class="factor-title">${escapeHtml(factor.label)}</h3>
                  <div class="factor-metrics">${escapeHtml((factor.metrics || []).join(", "))}</div>
                  <div class="tags">
                    <span class="tag ${tagClass(factor.side)}">${escapeHtml(factor.side)}</span>
                    <span class="tag ${tagClass(factor.horizon)}">${escapeHtml(labelHorizon(factor.horizon))}</span>
                  </div>
                </div>
                <div class="factor-count">${factor.signals.length} signals | ${articleCount} source articles</div>
              </div>
              <div class="signal-grid">
                ${factor.signals.map(renderSignal).join("")}
              </div>
            </section>
          `;
        }).join("");
      }

      function render() {
        nodes.timestamp.textContent = `Last scan: ${formatUtcDate(state.data?.generated_at)} | Source: ${state.data?.source?.name || "unknown"}`;
        renderFactors();
      }

      function bindControls() {
        document.querySelectorAll(".segmented").forEach((group) => {
          group.addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) return;
            group.querySelectorAll("button").forEach((node) => node.classList.remove("active"));
            button.classList.add("active");
            state.filters[group.dataset.filter] = button.dataset.value;
            renderFactors();
          });
        });
        nodes.search.addEventListener("input", () => {
          state.filters.search = nodes.search.value;
          renderFactors();
        });
        nodes.impact.addEventListener("change", () => {
          state.filters.impact = nodes.impact.value;
          renderFactors();
        });
      }

      async function boot() {
        bindControls();
        try {
          const response = await fetch(`data/latest.json?ts=${Date.now()}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.data = await response.json();
          render();
        } catch (error) {
          nodes.timestamp.textContent = "Scan data unavailable";
          nodes.factors.innerHTML = `<div class="error">Could not load data/latest.json: ${escapeHtml(error.message)}</div>`;
        }
      }

      boot();
    </script>
  </body>
</html>
