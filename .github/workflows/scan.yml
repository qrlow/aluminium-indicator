name: Refresh aluminium dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 7 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh data
        run: python3 scripts/scan_news.py --lookback-days 14 --max-per-query 8
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- docs/data/latest.json; then
            echo "No scan data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git commit -m "chore: refresh aluminium dashboard data"
          git push
